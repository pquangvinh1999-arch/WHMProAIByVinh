<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WHM PRO | Smart Warehouse</title>
    <link rel="manifest" href="manifest.json">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #020617; color: #f8fafc; }
        .glass-card { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .gradient-text { background: linear-gradient(135deg, #818cf8 0%, #c084fc 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .status-dot { animation: pulse 2s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.4; } 100% { opacity: 1; } }
        /* Ẩn thanh cuộn nhưng vẫn cuộn được */
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="p-4 pb-24">

    <header class="flex justify-between items-center mb-8 pt-2">
        <div>
            <p class="text-xs font-semibold text-indigo-400 tracking-[0.2em] uppercase">WHM Pro AI System By Vinh </p>
            <h1 class="text-2xl font-extrabold tracking-tight">WHM <span class="gradient-text">SMART PRO</span></h1>
        </div>
        <div class="relative">
            <div class="w-10 h-10 rounded-full bg-indigo-500/20 border border-indigo-500/30 flex items-center justify-center">
                <span class="text-indigo-400 font-bold">V</span>
            </div>
            <div class="absolute -top-1 -right-1 w-3 h-3 bg-emerald-500 rounded-full border-2 border-[#020617] status-dot"></div>
        </div>
    </header>

    <section class="grid grid-cols-2 gap-4 mb-8">
        <div class="glass-card p-4 rounded-3xl">
            <p class="text-slate-400 text-[10px] font-bold uppercase mb-1">Tổng tồn kho</p>
            <h3 class="text-xl font-bold italic">14,250 <span class="text-[10px] text-slate-500">Unit</span></h3>
        </div>
        <div class="glass-card p-4 rounded-3xl">
            <p class="text-slate-400 text-[10px] font-bold uppercase mb-1">Mã vật tư</p>
            <h3 class="text-xl font-bold italic">842 <span class="text-[10px] text-slate-500">SKU</span></h3>
        </div>
    </section>

    <section class="space-y-4 mb-8">
        <h2 class="text-xs font-bold text-slate-500 uppercase tracking-widest px-1">Điều khiển vận hành</h2>
        <div class="grid grid-cols-2 gap-4">
            <button class="flex flex-col items-center justify-center p-6 rounded-3xl bg-indigo-600 shadow-lg shadow-indigo-600/20 hover:scale-95 transition-transform">
                <span class="text-2xl mb-2">📥</span>
                <span class="font-bold text-sm text-white">NHẬP KHO</span>
            </button>
            <button class="flex flex-col items-center justify-center p-6 rounded-3xl glass-card hover:bg-white/5 transition-colors">
                <span class="text-2xl mb-2">📤</span>
                <span class="font-bold text-sm text-white">XUẤT KHO</span>
            </button>
        </div>
    </section>

    <section class="space-y-4">
        <div class="flex justify-between items-end px-1">
            <h2 class="text-xs font-bold text-slate-500 uppercase tracking-widest">Dữ liệu vật tư mới nhất</h2>
            <span class="text-[10px] text-indigo-400 font-bold">Xem tất cả</span>
        </div>

        <div class="space-y-3 no-scrollbar overflow-y-auto max-h-[400px]">
            <div class="glass-card p-4 rounded-3xl flex items-center gap-4">
                <div class="w-12 h-12 bg-white/5 rounded-2xl flex items-center justify-center text-xl font-bold text-indigo-300">
                    #
                </div>
                <div class="flex-1">
                    <div class="flex justify-between items-start">
                        <h4 class="font-bold text-slate-100 text-sm">3405420201</h4>
                        <span class="text-[10px] bg-emerald-500/10 text-emerald-400 px-2 py-0.5 rounded-full border border-emerald-500/20">Kho A</span>
                    </div>
                    <p class="text-[11px] text-slate-500 mt-1 font-medium">Vị trí: D2-03 | Lô: 2510000247-1</p>
                </div>
                <div class="text-right">
                    <p class="font-black text-indigo-400">1.170</p>
                    <p class="text-[9px] text-slate-600 uppercase font-bold">Số lượng</p>
                </div>
            </div>

            <div class="glass-card p-4 rounded-3xl flex items-center gap-4">
                <div class="w-12 h-12 bg-white/5 rounded-2xl flex items-center justify-center text-xl font-bold text-indigo-300">
                    #
                </div>
                <div class="flex-1">
                    <div class="flex justify-between items-start">
                        <h4 class="font-bold text-slate-100 text-sm">3406190401</h4>
                        <span class="text-[10px] bg-orange-500/10 text-orange-400 px-2 py-0.5 rounded-full border border-orange-500/20">Kho B</span>
                    </div>
                    <p class="text-[11px] text-slate-500 mt-1 font-medium">Vị trí: N100 | Lô: 2510000247-1</p>
                </div>
                <div class="text-right">
                    <p class="font-black text-indigo-400">1.446</p>
                    <p class="text-[9px] text-slate-600 uppercase font-bold">Số lượng</p>
                </div>
            </div>
        </div>
    </section>

    <nav class="fixed bottom-6 left-6 right-6 h-16 glass-card rounded-3xl flex items-center justify-around px-4 border border-white/10 shadow-2xl">
        <button class="text-indigo-400 text-xl">🏠</button>
        <button class="text-slate-500 text-xl">🔍</button>
        <div class="w-12 h-12 bg-indigo-600 rounded-2xl -mt-12 flex items-center justify-center shadow-lg shadow-indigo-600/40 border-4 border-[#020617]">
            <span class="text-white text-xl">📷</span>
        </div>
        <button class="text-slate-500 text-xl">📊</button>
        <button class="text-slate-500 text-xl">⚙️</button>
    </nav>

</body>
</html>
