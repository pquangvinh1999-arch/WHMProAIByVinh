<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>WHMFG AI | By Vinh</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/apexcharts"></script>
<script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>
body {
    font-family: 'Inter', sans-serif;
    background: linear-gradient(135deg, #eef2ff, #f8fafc);
}

/* Glass UI */
.glass-card {
    background: rgba(255,255,255,0.75);
    backdrop-filter: blur(14px);
    border-radius: 20px;
    border: 1px solid rgba(255,255,255,0.4);
    box-shadow: 0 10px 30px rgba(0,0,0,0.05);
    transition: all .3s ease;
}
.glass-card:hover {
    transform: translateY(-4px) scale(1.01);
}

/* KPI animation */
@keyframes fadeUp {
    from {opacity:0; transform:translateY(20px)}
    to {opacity:1; transform:translateY(0)}
}
.animate-kpi {
    animation: fadeUp .6s ease forwards;
}

/* loading */
#loading {
    position:fixed;
    inset:0;
    background:rgba(255,255,255,.9);
    display:flex;
    align-items:center;
    justify-content:center;
    flex-direction:column;
    z-index:999;
}
.spinner {
    width:50px;height:50px;
    border:4px solid #ddd;
    border-top:4px solid #6366f1;
    border-radius:50%;
    animation:spin 1s linear infinite;
}
@keyframes spin {to{transform:rotate(360deg)}}

/* table */
.table-container::-webkit-scrollbar {
    height:6px;width:6px;
}
.table-container::-webkit-scrollbar-thumb {
    background:#cbd5f5;
    border-radius:10px;
}

/* header gradient */
.title-gradient {
    background: linear-gradient(90deg,#6366f1,#8b5cf6);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}
</style>
</head>

<body class="p-6 max-w-[1600px] mx-auto">

<div id="loading">
    <div class="spinner"></div>
    <p class="mt-4 font-bold text-indigo-600 animate-pulse">ĐANG ĐỒNG BỘ DỮ LIỆU...</p>
</div>

<header class="flex justify-between items-end mb-10">
    <div>
        <p class="text-xs font-bold text-indigo-500 uppercase">Inventory System</p>
        <h1 class="text-4xl font-extrabold title-gradient">WHM Finished Goods</h1>
    </div>
    <div class="text-right">
        <button onclick="fetchData()" class="bg-indigo-600 text-white px-6 py-3 rounded-xl font-bold hover:bg-indigo-700 shadow-lg">
            LÀM MỚI
        </button>
        <p class="text-xs mt-2">Cập nhật: <span id="last-update">--</span></p>
    </div>
</header>

<!-- KPI -->
<section class="grid grid-cols-1 md:grid-cols-5 gap-5 mb-10">

<div class="glass-card p-6 animate-kpi">
    <p class="text-xs text-slate-400">TOTAL ACTUAL</p>
    <h3 id="kpi-total-actual" class="text-3xl font-black">0</h3>
</div>

<div class="glass-card p-6 animate-kpi">
    <p class="text-xs text-slate-400">DIFF</p>
    <h3 id="kpi-diff" class="text-3xl font-black">0</h3>
</div>

<div class="glass-card p-6 animate-kpi">
    <p class="text-xs text-slate-400">NO DATA</p>
    <h3 id="kpi-nodata" class="text-3xl font-black text-rose-500">0</h3>
</div>

<div class="glass-card p-6 animate-kpi">
    <p class="text-xs text-slate-400">NOT MOVED</p>
    <h3 id="kpi-notmoved" class="text-3xl font-black text-amber-500">0</h3>
</div>

<div class="glass-card p-6 animate-kpi">
    <p class="text-xs text-slate-400">DUPLICATE TAG</p>
    <h3 id="kpi-duplicates" class="text-3xl font-black text-red-500">0</h3>
</div>

</section>

<!-- CHART -->
<section class="grid grid-cols-1 lg:grid-cols-3 gap-8 mb-10">

<div class="glass-card p-6 lg:col-span-2">
    <h3 class="font-bold mb-4">ACTUAL vs ISCALA</h3>
    <div id="chart-comparison"></div>
</div>

<div class="glass-card p-6">
    <h3 class="font-bold mb-4">RISK</h3>
    <div id="chart-pie-risk"></div>
</div>

</section>

<!-- FILTER -->
<div class="flex justify-between mb-4">
    <input id="filter-input" placeholder="Search..." class="border px-4 py-2 rounded-lg w-64">
    <button onclick="exportToExcel()" class="bg-green-600 text-white px-4 py-2 rounded-lg">EXPORT</button>
</div>

<!-- TABLE -->
<div class="glass-card overflow-hidden">
<div class="table-container overflow-x-auto max-h-[600px]">

<table class="w-full text-sm">
<thead class="bg-slate-100 sticky top-0">
<tr>
<th>LP</th>
<th>FEATURE</th>
<th>ACTUAL</th>
<th>ISCALA</th>
<th>WH</th>
<th>IN DATE</th>
<th>CREATE</th>
<th>TAG</th>
<th>BIN</th>
</tr>
</thead>

<tbody id="table-body"></tbody>

</table>
</div>
</div>

<script>

const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbwV3F3xyItM4kdB2tVA8w04W6pFkdXP7x1lv1nU-Hh-hat4zw3rD5kmYlPeQZWnXIM/exec";
let rawData = [];
let chartBar, chartPie;

async function fetchData(){
    document.getElementById('loading').style.display='flex';
    try{
        const res = await fetch(WEB_APP_URL);
        const data = await res.json();

        rawData = data;
        document.getElementById('last-update').innerText = new Date().toLocaleTimeString();

        initDashboard(data);

    }catch(e){
        alert("Lỗi load data");
    }
    document.getElementById('loading').style.display='none';
}

function initDashboard(data){
    updateKPIs(data);
    renderTable(data);
    renderCharts(data);
}

/* KPI */
function updateKPIs(data){
    let total=0;
    data.forEach(r=> total+=Number(r.colC)||0);
    document.getElementById('kpi-total-actual').innerText = total.toLocaleString();
}

/* TABLE */
function renderTable(data){
    const tb = document.getElementById('table-body');
    tb.innerHTML='';
    data.forEach(r=>{
        tb.innerHTML+=`
        <tr class="hover:bg-slate-50 transition">
            <td>${r.colA}</td>
            <td>${r.colB}</td>
            <td>${r.colC}</td>
            <td>${r.colD}</td>
            <td>${r.colE}</td>
            <td>${r.colF}</td>
            <td>${r.colG}</td>
            <td>${r.colH}</td>
            <td>${r.colI}</td>
        </tr>`;
    });
}

/* CHART */
function renderCharts(data){

    const labels = data.map(r=>r.colB);
    const actual = data.map(r=>Number(r.colC)||0);

    const options = {
        series:[{name:'Actual',data:actual}],
        chart:{
            type:'bar',
            height:300,
            animations:{
                enabled:true,
                easing:'easeinout',
                speed:900
            }
        },
        xaxis:{categories:labels}
    };

    if(chartBar) chartBar.destroy();
    chartBar = new ApexCharts(document.querySelector("#chart-comparison"), options);
    chartBar.render();

    const pieOptions = {
        series:[10,20,30],
        labels:["A","B","C"],
        chart:{
            type:'donut',
            animations:{
                enabled:true,
                easing:'easeinout',
                speed:1000
            }
        }
    };

    if(chartPie) chartPie.destroy();
    chartPie = new ApexCharts(document.querySelector("#chart-pie-risk"), pieOptions);
    chartPie.render();
}

fetchData();

</script>

</body>
</html>c
