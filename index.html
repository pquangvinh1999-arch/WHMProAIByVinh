<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WHMFG AI | By Vinh</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/apexcharts"></script>
    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root { --primary: #4f46e5; --success: #10b981; --danger: #f43f5e; --warning: #f59e0b; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; color: #1e293b; }
        .glass-card { background: #ffffff; border-radius: 20px; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.05); border: 1px solid #f1f5f9; transition: all 0.3s; }
        .kpi-card:hover { transform: translateY(-5px); box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1); }
        
        /* --- CHATBOT FLOATING UI --- */
        #chat-widget { position: fixed; bottom: 30px; right: 30px; z-index: 1000; }
        #chat-button { width: 65px; height: 65px; background: linear-gradient(135deg, #6366f1 0%, #a855f7 100%); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; box-shadow: 0 10px 25px rgba(99, 102, 241, 0.4); cursor: pointer; transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        #chat-button:hover { transform: scale(1.1) rotate(10deg); }
        
        #chat-window { position: absolute; bottom: 85px; right: 0; width: 380px; height: 550px; background: white; border-radius: 24px; box-shadow: 0 20px 50px rgba(0,0,0,0.15); display: none; flex-direction: column; overflow: hidden; transform-origin: bottom right; animation: zoomIn 0.3s ease-out; border: 1px solid #f1f5f9; }
        @keyframes zoomIn { from { opacity: 0; transform: scale(0.5); } to { opacity: 1; transform: scale(1); } }
        
        .chat-header { background: linear-gradient(90deg, #6366f1, #a855f7); padding: 20px; color: white; }
        #chat-body { flex: 1; padding: 20px; overflow-y: auto; background: #fdfdff; display: flex; flex-direction: column; gap: 12px; }
        .msg { max-width: 80%; padding: 12px 16px; border-radius: 18px; font-size: 14px; line-height: 1.5; }
        .msg-ai { align-self: flex-start; background: white; border: 1px solid #e2e8f0; color: #334155; border-bottom-left-radius: 4px; }
        .msg-user { align-self: flex-end; background: #6366f1; color: white; border-bottom-right-radius: 4px; }
        .typing { font-size: 12px; color: #94a3b8; font-style: italic; display: none; }
        
        /* Scrollbar */
        #chat-body::-webkit-scrollbar { width: 5px; }
        #chat-body::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
    </style>
</head>
<body class="p-6 pb-20 max-w-[1600px] mx-auto">

    <header class="flex justify-between items-end mb-10">
        <div>
            <h1 class="text-4xl font-extrabold text-slate-900">WHM System <span class="text-indigo-600">AI</span> FG</h1>
            <p class="text-xs font-bold text-indigo-600 tracking-widest uppercase mt-2">Inventory Data Analysis • By Vinh</p>
        </div>
        <button onclick="fetchData()" class="bg-indigo-600 text-white px-6 py-3 rounded-xl font-bold hover:bg-indigo-700 transition-all shadow-lg active:scale-95">LÀM MỚI DỮ LIỆU</button>
    </header>

    <section id="kpi-container" class="grid grid-cols-1 md:grid-cols-4 gap-5 mb-10">
        <div class="glass-card kpi-card p-6 border-b-4 border-indigo-500 text-center">
            <p class="text-xs font-bold text-slate-400 uppercase mb-2">Tổng Tồn Kho</p>
            <h3 class="text-3xl font-black" id="kpi-total-actual">0</h3>
        </div>
        <div class="glass-card kpi-card p-6 border-b-4 border-rose-500 text-center">
            <p class="text-xs font-bold text-slate-400 uppercase mb-2">Chênh Lệch</p>
            <h3 class="text-3xl font-black text-rose-600" id="kpi-diff">0</h3>
        </div>
        </section>

    <div class="glass-card p-6 mb-10"><div id="chart-comparison" class="h-80"></div></div>

    <div class="glass-card overflow-hidden">
        <table class="w-full text-left text-sm whitespace-nowrap">
            <thead class="bg-slate-50 text-[11px] font-black uppercase text-slate-400">
                <tr><th class="p-5">LP NO</th><th class="p-5">FEATURE</th><th class="p-5 text-right">ACTUAL</th><th class="p-5">TAG ID</th><th class="p-5">WH LOC</th></tr>
            </thead>
            <tbody id="table-body" class="divide-y divide-slate-100 font-medium"></tbody>
        </table>
    </div>

    <div id="chat-widget">
        <div id="chat-button" onclick="toggleChat()">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z" />
            </svg>
        </div>

        <div id="chat-window">
            <div class="chat-header">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 rounded-full bg-white/20 flex items-center justify-center font-bold">L</div>
                    <div>
                        <h4 class="font-bold text-sm">Trợ lý Llama AI</h4>
                        <p class="text-[10px] opacity-80">Online • Phân tích kho 24/7</p>
                    </div>
                </div>
            </div>
            
            <div id="chat-body">
                <div class="msg msg-ai">Chào anh Vinh! Em đã sẵn sàng phân tích dữ liệu kho. Anh cần kiểm tra mã nào không ạ?</div>
            </div>
            
            <div id="chat-typing" class="px-5 py-2 typing">Llama đang phân tích...</div>

            <div class="p-4 border-t bg-white flex gap-2">
                <input type="text" id="ai-input" placeholder="Nhập câu hỏi..." class="flex-1 bg-slate-100 border-none rounded-xl px-4 py-3 text-sm focus:ring-2 ring-indigo-500 outline-none">
                <button onclick="askAI()" class="bg-indigo-600 text-white p-3 rounded-xl hover:bg-indigo-700 transition-all">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9-2-9-18-9 18 9 2zm0 0v-8" />
                    </svg>
                </button>
            </div>
        </div>
    </div>

    <script>
        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbz-vaQId1E_v39B2KuRsYTVkH59Xa5r3Ec2S5-9Jj-pdO0vc9C_vSEuzIWT4039s0Jc/exec"; 
        let rawData = [];

        function toggleChat() {
            const win = document.getElementById('chat-window');
            win.style.display = (win.style.display === 'flex') ? 'none' : 'flex';
        }

        // --- LẮNG NGHE PHÍM ENTER ---
        document.getElementById('ai-input').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') askAI();
        });

        async function askAI() {
            const input = document.getElementById('ai-input');
            const chatBody = document.getElementById('chat-body');
            const typing = document.getElementById('chat-typing');
            const query = input.value.trim();
            
            if (!query) return;

            // Hiển thị tin nhắn user
            chatBody.innerHTML += `<div class="msg msg-user">${query}</div>`;
            input.value = '';
            chatBody.scrollTop = chatBody.scrollHeight;
            typing.style.display = 'block';

            try {
                const response = await fetch(WEB_APP_URL, {
                    method: 'POST',
                    body: JSON.stringify({ query: query, data: rawData })
                });
                const result = await response.json();
                const aiAnswer = result.choices[0].message.content;

                typing.style.display = 'none';
                chatBody.innerHTML += `<div class="msg msg-ai">${aiAnswer.replace(/\n/g, '<br>')}</div>`;
                chatBody.scrollTop = chatBody.scrollHeight;
            } catch (e) {
                typing.style.display = 'none';
                chatBody.innerHTML += `<div class="msg msg-ai text-red-500">Lỗi kết nối rồi anh ơi!</div>`;
            }
        }

        async function fetchData() {
            try {
                const response = await fetch(WEB_APP_URL);
                rawData = await response.json();
                renderTable(rawData);
                updateKPIs(rawData);
            } catch (e) { console.error("Lỗi tải dữ liệu"); }
        }

        function renderTable(data) {
            const tbody = document.getElementById('table-body');
            tbody.innerHTML = data.map(r => `
                <tr class="hover:bg-slate-50 transition-colors">
                    <td class="p-5 font-bold text-slate-500">${r.colA}</td>
                    <td class="p-5">${r.colB}</td>
                    <td class="p-5 text-right font-black">${Number(r.colC).toLocaleString()}</td>
                    <td class="p-5 text-xs font-mono text-indigo-400">${r.colH}</td>
                    <td class="p-5"><span class="px-3 py-1 bg-slate-100 rounded-lg text-[10px] font-bold">${r.colE}</span></td>
                </tr>
            `).join('');
        }

        function updateKPIs(data) {
            const total = data.reduce((sum, r) => sum + (Number(r.colC) || 0), 0);
            document.getElementById('kpi-total-actual').innerText = total.toLocaleString();
        }

        fetchData();
    </script>
</body>
</html>
