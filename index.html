<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WHMFG AI | By Vinh</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/apexcharts"></script>
    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; }
        .glass-card { background: #ffffff; border-radius: 20px; box-shadow: 0 4px 20px rgba(0,0,0,0.03); border: 1px solid #f1f5f9; }
        
        /* Module Nhập/Xuất chuyên nghiệp */
        .btn-module-in {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            box-shadow: 0 10px 15px -3px rgba(16, 185, 129, 0.3);
        }
        .btn-module-out {
            background: linear-gradient(135deg, #f43f5e 0%, #e11d48 100%);
            box-shadow: 0 10px 15px -3px rgba(244, 63, 94, 0.3);
        }
        .btn-module:hover { transform: translateY(-3px); filter: brightness(1.1); box-shadow: 0 15px 20px -5px rgba(0,0,0,0.15); }
        
        /* Loading Animation */
        #loading { position: fixed; inset: 0; background: rgba(255,255,255,0.9); z-index: 9999; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .spinner { width: 50px; height: 50px; border: 5px solid #f3f3f3; border-top: 5px solid #4f46e5; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="p-4 md:p-8">

    <div id="loading">
        <div class="spinner mb-4"></div>
        <p class="font-bold text-indigo-600 animate-pulse uppercase tracking-widest">Đang tải dữ liệu kho...</p>
    </div>

    <header class="flex flex-col md:flex-row justify-between items-start md:items-center mb-8 gap-4">
        <div>
            <h1 class="text-3xl font-extrabold text-slate-900">WHMFG <span class="text-indigo-600">AI</span> Dashboard</h1>
            <p class="text-sm text-slate-400 font-medium">Phát triển bởi <span class="text-slate-900 font-bold">Vinh</span> | Quản lý thành phẩm</p>
        </div>
        <div class="flex gap-3">
            <a href="#" class="btn-module btn-module-in text-white px-6 py-4 rounded-2xl flex items-center gap-3 transition-all">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 4v16m8-8H4"/></svg>
                <span class="font-extrabold tracking-tight">NHẬP KHO</span>
            </a>
            <a href="#" class="btn-module btn-module-out text-white px-6 py-4 rounded-2xl flex items-center gap-3 transition-all">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M20 12H4"/></svg>
                <span class="font-extrabold tracking-tight">XUẤT KHO</span>
            </a>
        </div>
    </header>

    <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-8 text-center">
        <div class="glass-card p-5 border-b-4 border-indigo-500">
            <p class="text-[10px] font-extrabold text-slate-400 uppercase mb-1">TỔNG THỰC TẾ</p>
            <h2 id="kpi-total-actual" class="text-3xl font-black text-slate-800">0</h2>
        </div>
        <div class="glass-card p-5 border-b-4 border-emerald-500">
            <p class="text-[10px] font-extrabold text-slate-400 uppercase mb-1">CHÊNH LỆCH</p>
            <h2 id="kpi-diff" class="text-3xl font-black text-emerald-600">0</h2>
        </div>
        <div class="glass-card p-5 border-b-4 border-rose-500">
            <p class="text-[10px] font-extrabold text-slate-400 uppercase mb-1">TAG ID LỖI</p>
            <h2 id="kpi-nodata" class="text-3xl font-black text-rose-600">0</h2>
        </div>
        <div class="glass-card p-5 border-b-4 border-amber-500">
            <p class="text-[10px] font-extrabold text-slate-400 uppercase mb-1">CHƯA CHUYỂN KHO</p>
            <h2 id="kpi-notmoved" class="text-3xl font-black text-amber-600">0</h2>
        </div>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-3 gap-6 mb-8">
        <div class="glass-card p-6 lg:col-span-2">
            <h3 class="text-sm font-extrabold text-slate-800 uppercase mb-4">Phân tích thực tế vs Hệ thống</h3>
            <div id="chart-bar-compare"></div>
        </div>
        <div class="glass-card p-6">
            <h3 class="text-sm font-extrabold text-slate-800 uppercase mb-4 text-center">Tỉ trọng rủi ro</h3>
            <div id="chart-donut-risk"></div>
        </div>
    </div>

    <div class="glass-card p-6 mb-8 border-l-8 border-indigo-600">
        <div class="flex items-center gap-3 mb-4">
            <div class="bg-indigo-600 text-white p-2 rounded-lg"><svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor"><path d="M2 5a2 2 0 012-2h7a2 2 0 012 2v4a2 2 0 01-2 2H9l-3 3v-3H4a2 2 0 01-2-2V5z"/></svg></div>
            <h3 class="font-extrabold text-slate-800">Glory AI Assistant</h3>
        </div>
        <div class="flex gap-2">
            <input type="text" id="ai-input" placeholder="Hỏi Glory về mã hàng, kiện hoặc tag ID..." class="flex-1 bg-slate-50 border-2 border-slate-100 rounded-xl px-4 py-3 outline-none focus:border-indigo-400 transition-all text-sm">
            <button onclick="chatWithAI()" class="bg-indigo-600 text-white px-6 py-3 rounded-xl font-bold shadow-lg shadow-indigo-200">Hỏi Glory</button>
        </div>
        <div id="ai-response" class="mt-4 hidden p-4 bg-indigo-50 rounded-xl text-sm border border-indigo-100 leading-relaxed"></div>
    </div>

    <script>
        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbyVz_F9b_pw6Y1NrT3oKEcTQzIW41W_svhH3jDfeL71h4uVe7ncJnKt2IGQ11jMTdxj/exec";
        let rawData = [];

        async function fetchData() {
            try {
                const res = await fetch(WEB_APP_URL);
                rawData = await res.json();
                initDashboard();
                document.getElementById('loading').style.display = 'none';
            } catch (e) { alert("Lỗi tải dữ liệu!"); }
        }

        function initDashboard() {
            // Tính toán KPI
            let actual = 0, iscala = 0, nodata = 0, notmoved = 0;
            const groups = {};

            rawData.forEach(r => {
                const act = Number(r.colC) || 0;
                const isc = r.colD === "No data" ? 0 : Number(r.colD) || 0;
                actual += act; iscala += isc;
                if(r.colD === "No data") nodata++;
                if(r.colE == "50" || r.colE == "62") notmoved++;

                if(!groups[r.colB]) groups[r.colB] = { act: 0, isc: 0 };
                groups[r.colB].act += act; groups[r.colB].isc += isc;
            });

            document.getElementById('kpi-total-actual').innerText = actual.toLocaleString();
            document.getElementById('kpi-diff').innerText = (actual - iscala).toLocaleString();
            document.getElementById('kpi-nodata').innerText = nodata;
            document.getElementById('kpi-notmoved').innerText = notmoved;

            renderCharts(groups, actual - iscala);
        }

        function renderCharts(groups, totalDiff) {
            const keys = Object.keys(groups);
            
            // Bar Chart - Bo góc cực đẹp
            new ApexCharts(document.querySelector("#chart-bar-compare"), {
                series: [
                    { name: 'Thực tế', data: keys.map(k => groups[k].act) },
                    { name: 'iScala', data: keys.map(k => groups[k].isc) }
                ],
                chart: { type: 'bar', height: 350, toolbar: { show: false } },
                plotOptions: { 
                    bar: { 
                        horizontal: false, 
                        columnWidth: '55%', 
                        borderRadius: 8, // Bo góc cột đứng
                        borderRadiusApplication: 'around' 
                    } 
                },
                colors: ['#4f46e5', '#e2e8f0'],
                xaxis: { categories: keys },
                legend: { position: 'top' },
                dataLabels: { enabled: false }
            }).render();

            // Donut Chart - Có tổng ở giữa
            new ApexCharts(document.querySelector("#chart-donut-risk"), {
                series: keys.map(k => Math.abs(groups[k].act - groups[k].isc)),
                labels: keys,
                chart: { type: 'donut', height: 380 },
                colors: ['#4f46e5', '#10b981', '#f59e0b', '#f43f5e', '#8b5cf6'],
                plotOptions: {
                    pie: {
                        donut: {
                            size: '75%',
                            labels: {
                                show: true,
                                name: { show: true, fontSize: '12px', fontWeight: 600 },
                                value: { show: true, fontSize: '20px', fontWeight: 800, formatter: v => Number(v).toLocaleString() },
                                total: {
                                    show: true,
                                    label: 'TỔNG LỆCH',
                                    fontSize: '10px',
                                    fontWeight: 800,
                                    color: '#64748b',
                                    formatter: () => totalDiff.toLocaleString()
                                }
                            }
                        }
                    }
                },
                legend: { position: 'bottom' }
            }).render();
        }

        async function chatWithAI() {
            const btn = event.target;
            const input = document.getElementById('ai-input');
            const box = document.getElementById('ai-response');
            if(!input.value) return;

            btn.innerText = "Đang nghĩ..."; btn.disabled = true;
            box.classList.remove('hidden');
            box.innerHTML = "<em>Glory đang phân tích dữ liệu kho...</em>";

            try {
                const res = await fetch(WEB_APP_URL, {
                    method: 'POST',
                    body: JSON.stringify({ query: input.value })
                });
                const data = await res.json();
                box.innerHTML = `<strong>Glory:</strong><br>${data.answer.replace(/\n/g, '<br>')}`;
            } catch (e) { box.innerText = "Lỗi kết nối!"; }
            
            btn.innerText = "Hỏi Glory"; btn.disabled = false;
        }

        window.onload = fetchData;
    </script>
</body>
</html>
