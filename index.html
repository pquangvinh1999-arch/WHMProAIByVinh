<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WHMFG Dashboard</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/apexcharts"></script>
<script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>

<style>
body { font-family: sans-serif; background:#f8fafc }
.glass { background:white; border-radius:16px; padding:20px; box-shadow:0 5px 15px rgba(0,0,0,0.05)}
</style>
</head>

<body class="p-6">

<h1 class="text-3xl font-bold mb-6">📊 WHM Finished Goods Dashboard</h1>

<!-- KPI -->
<div class="grid grid-cols-5 gap-4 mb-6">
    <div class="glass"><b>Total Actual</b><h2 id="kpi-total">0</h2></div>
    <div class="glass"><b>Diff</b><h2 id="kpi-diff">0</h2></div>
    <div class="glass"><b>No Data</b><h2 id="kpi-nodata">0</h2></div>
    <div class="glass"><b>Need Move</b><h2 id="kpi-move">0</h2></div>
    <div class="glass"><b>Duplicate</b><h2 id="kpi-dup">0</h2></div>
</div>

<!-- CHART -->
<div class="grid grid-cols-2 gap-6 mb-6">
    <div class="glass">
        <h3 class="font-bold mb-2">Actual vs iScala</h3>
        <div id="chart-main"></div>
    </div>

    <div class="glass">
        <h3 class="font-bold mb-2">⚠️ Risk by Feature</h3>
        <div id="chart-risk"></div>
    </div>
</div>

<!-- TABLE -->
<div class="glass">
<table class="w-full text-sm">
<thead>
<tr class="bg-gray-100">
<th>Feature</th>
<th>Actual</th>
<th>iScala</th>
<th>WH</th>
<th>Tag</th>
</tr>
</thead>
<tbody id="table"></tbody>
</table>
</div>

<script>
const URL = "https://script.google.com/macros/s/AKfycby9uO8NOUbIJFCfVbZnen2ziLVL8VOp2oyK3baxlBVdzTmqLN1H_ErDniaofkuovgY/exec";

let raw=[];

async function fetchData(){
    const res = await fetch(URL);
    const data = await res.json();
    raw=data;
    render(data);
}

function render(data){

    let total=0, totalSys=0;
    let nodata=0, move=0;
    let dupMap={};

    data.forEach(r=>{
        total += Number(r.colC)||0;
        totalSys += Number(r.colD)||0;

        if(String(r.colE).toLowerCase().includes("no data")) nodata++;
        if(String(r.colE).includes("50")||String(r.colE).includes("62")) move++;

        if(r.colH){
            dupMap[r.colH]=(dupMap[r.colH]||0)+1;
        }
    });

    let dup = Object.values(dupMap).filter(v=>v>1).length;

    document.getElementById('kpi-total').innerText=total;
    document.getElementById('kpi-diff').innerText=total-totalSys;
    document.getElementById('kpi-nodata').innerText=nodata;
    document.getElementById('kpi-move').innerText=move;
    document.getElementById('kpi-dup').innerText=dup;

    renderTable(data);
    renderChart(data);
    renderRisk(data);
}

function renderTable(data){
    let html="";
    data.forEach(r=>{
        html+=`
        <tr>
        <td>${r.colB}</td>
        <td>${r.colC}</td>
        <td>${r.colD}</td>
        <td>${r.colE}</td>
        <td>${r.colH}</td>
        </tr>`;
    });
    document.getElementById("table").innerHTML=html;
}

function renderChart(data){

    let group={};

    data.forEach(r=>{
        if(!group[r.colB]) group[r.colB]={a:0,b:0};
        group[r.colB].a+=Number(r.colC)||0;
        group[r.colB].b+=Number(r.colD)||0;
    });

    let labels=Object.keys(group);
    let actual=labels.map(k=>group[k].a);
    let iscala=labels.map(k=>group[k].b);

    new ApexCharts(document.querySelector("#chart-main"),{
        chart:{type:'bar',height:300},
        series:[
            {name:'Actual',data:actual},
            {name:'iScala',data:iscala}
        ],
        xaxis:{categories:labels}
    }).render();
}

function renderRisk(data){

    let urgent={}, future={}, dupMap={};

    data.forEach(r=>{
        if(r.colH){
            dupMap[r.colH]=(dupMap[r.colH]||0)+1;
        }
    });

    data.forEach(r=>{
        // No data = urgent
        if(String(r.colE).toLowerCase().includes("no data")){
            urgent[r.colB]=(urgent[r.colB]||0)+1;
        }

        // duplicate = future
        if(dupMap[r.colH]>1){
            future[r.colB]=(future[r.colB]||0)+1;
        }
    });

    let labels=[...new Set([...Object.keys(urgent),...Object.keys(future)])];

    let urgentData=labels.map(l=>urgent[l]||0);
    let futureData=labels.map(l=>future[l]||0);

    new ApexCharts(document.querySelector("#chart-risk"),{
        chart:{type:'bar',height:300},
        series:[
            {name:'🔴 Urgent (No Data)',data:urgentData},
            {name:'🟡 Future (Duplicate)',data:futureData}
        ],
        xaxis:{categories:labels}
    }).render();
}

fetchData();
</script>

</body>
</html>
