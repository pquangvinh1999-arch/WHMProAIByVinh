<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WHM PRO | Smart Warehouse</title>
    
    <link rel="manifest" href="manifest.json">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #020617; color: #f8fafc; overflow-x: hidden; }
        .glass-card { background: rgba(30, 41, 59, 0.5); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.08); }
        .gradient-text { background: linear-gradient(135deg, #818cf8 0%, #c084fc 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .btn-active:active { transform: scale(0.95); }
        #reader { width: 100%; border-radius: 20px; overflow: hidden; display: none; }
    </style>
</head>
<body class="p-4 pb-28">

    <header class="flex justify-between items-center mb-8 pt-2">
        <div>
            <p class="text-[10px] font-bold text-indigo-400 tracking-[0.2em] uppercase">WHM AI System By Vinh</p>
            <h1 class="text-2xl font-extrabold">WHM <span class="gradient-text">SMART PRO</span></h1>
        </div>
        <div class="w-11 h-11 rounded-2xl bg-indigo-500/10 border border-indigo-500/20 flex items-center justify-center font-bold text-indigo-400">V</div>
    </header>

    <div id="scanner-container" class="mb-6 hidden">
        <div class="glass-card p-2 rounded-[2rem]">
            <div id="reader"></div>
            <button onclick="stopScanner()" class="w-full py-3 text-red-400 font-bold text-xs uppercase tracking-widest">Đóng Camera</button>
        </div>
    </div>

    <section class="grid grid-cols-2 gap-4 mb-8">
        <div class="glass-card p-5 rounded-[2rem]">
            <p class="text-slate-400 text-[9px] font-bold uppercase mb-1">Tồn kho</p>
            <h3 class="text-xl font-black italic">14,250 <span class="text-[10px] text-slate-500 not-italic">Unit</span></h3>
        </div>
        <div class="glass-card p-5 rounded-[2rem]">
            <p class="text-slate-400 text-[9px] font-bold uppercase mb-1">Vật tư</p>
            <h3 class="text-xl font-black italic">842 <span class="text-[10px] text-slate-500 not-italic">SKU</span></h3>
        </div>
    </section>

    <section class="grid grid-cols-2 gap-4 mb-8 text-center">
        <button onclick="alert('Mời bạn nhấn nút Camera để quét mã nhập kho')" class="btn-active p-6 rounded-[2.5rem] bg-indigo-600 shadow-xl shadow-indigo-600/20">
            <span class="text-2xl block mb-1">📥</span>
            <span class="font-extrabold text-sm">NHẬP KHO</span>
        </button>
        <button onclick="alert('Mời bạn nhấn nút Camera để quét mã xuất kho')" class="btn-active p-6 rounded-[2.5rem] glass-card">
            <span class="text-2xl block mb-1">📤</span>
            <span class="font-extrabold text-sm text-white">XUẤT KHO</span>
        </button>
    </section>

    <section class="space-y-4">
        <h2 class="text-[11px] font-bold text-slate-500 uppercase tracking-widest px-1">Dữ liệu mới nhất</h2>
        <div id="data-container" class="space-y-3">
            <div class="text-center py-10 text-slate-600 text-[10px] uppercase font-bold tracking-tighter">Sẵn sàng nhận dữ liệu...</div>
        </div>
    </section>

    <nav class="fixed bottom-6 left-6 right-6 h-20 glass-card rounded-[2.5rem] flex items-center justify-around px-6 border border-white/10 shadow-2xl z-50">
        <button class="text-indigo-400 text-2xl p-2 btn-active">🏠</button>
        <button class="text-slate-500 text-2xl p-2 btn-active">🔍</button>
        <button onclick="startScanner()" class="w-16 h-16 bg-indigo-600 rounded-3xl -mt-14 flex items-center justify-center shadow-2xl shadow-indigo-600/40 border-[6px] border-[#020617] btn-active">
            <span class="text-white text-2xl">📷</span>
        </button>
        <button class="text-slate-500 text-2xl p-2 btn-active">📊</button>
        <button class="text-slate-500 text-2xl p-2 btn-active">⚙️</button>
    </nav>

    <script>
        let html5QrCode;

        function startScanner() {
            document.getElementById('scanner-container').style.display = 'block';
            document.getElementById('reader').style.display = 'block';
            
            html5QrCode = new Html5Qrcode("reader");
            const config = { fps: 10, qrbox: { width: 250, height: 150 } };

            html5QrCode.start({ facingMode: "environment" }, config, (decodedText) => {
                // Xử lý khi quét thành công
                const container = document.getElementById('data-container');
                const time = new Date().toLocaleTimeString('vi-VN');
                
                // Thêm kết quả quét vào danh sách
                const newCard = `
                    <div class="glass-card p-5 rounded-[2rem] flex items-center gap-4 border-indigo-500/30">
                        <div class="flex-1">
                            <h4 class="font-bold text-indigo-300 text-sm">${decodedText}</h4>
                            <p class="text-[10px] text-slate-500">Thời gian: ${time}</p>
                        </div>
                        <div class="text-right"><span class="text-xs font-bold text-emerald-400">ĐÃ QUÉT</span></div>
                    </div>
                `;
                container.innerHTML = newCard + container.innerHTML;
                
                // Rung nhẹ và dừng quét
                if (navigator.vibrate) navigator.vibrate(100);
                stopScanner();
            }).catch(err => console.log(err));
        }

        function stopScanner() {
            if (html5QrCode) {
                html5QrCode.stop().then(() => {
                    document.getElementById('scanner-container').style.display = 'none';
                });
            }
        }
    </script>
</body>
</html>
