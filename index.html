<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WHM PRO | Smart Warehouse</title>
    
    <link rel="manifest" href="manifest.json">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #020617; color: #f8fafc; }
        .glass-card { background: rgba(30, 41, 59, 0.6); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.08); }
        .gradient-text { background: linear-gradient(135deg, #818cf8 0%, #c084fc 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .btn-active:active { transform: scale(0.95); transition: 0.1s; }
        #reader { width: 100%; border-radius: 20px; overflow: hidden; display: none; }
    </style>
</head>
<body class="p-4 pb-28">

    <div id="install-banner" class="hidden fixed top-4 left-4 right-4 z-[100] glass-card p-4 rounded-3xl border-indigo-500/50 shadow-2xl bg-indigo-950/90">
        <div class="flex items-center gap-4">
            <img src="https://cdn-icons-png.flaticon.com/512/2274/2274532.png" class="w-10 h-10 rounded-xl">
            <div class="flex-1">
                <h4 class="text-xs font-bold text-white">WHM PRO AI</h4>
                <p class="text-[9px] text-slate-400">Tải app để quét mã mượt hơn</p>
            </div>
            <button id="btn-install-now" class="bg-indigo-600 px-4 py-2 rounded-xl text-[10px] font-black text-white shadow-lg active:scale-90">TẢI VỀ</button>
            <button onclick="document.getElementById('install-banner').style.display='none'" class="text-slate-500 px-2">✕</button>
        </div>
    </div>

    <header class="flex justify-between items-center mb-8 pt-2">
        <div>
            <p class="text-[10px] font-bold text-indigo-400 tracking-[0.2em] uppercase">WHM AI System By Vinh</p>
            <h1 class="text-2xl font-extrabold">WHM <span class="gradient-text">SMART PRO</span></h1>
        </div>
        <div class="w-11 h-11 rounded-2xl bg-indigo-500/10 border border-indigo-500/20 flex items-center justify-center font-bold text-indigo-400 shadow-inner">V</div>
    </header>

    <div id="scanner-container" class="mb-6 hidden">
        <div class="glass-card p-2 rounded-[2rem]">
            <div id="reader"></div>
            <button onclick="stopScanner()" class="w-full py-3 text-red-400 font-bold text-xs uppercase tracking-widest">Đóng Camera</button>
        </div>
    </div>

    <section class="grid grid-cols-2 gap-4 mb-8">
        <div class="glass-card p-5 rounded-[2rem]">
            <p class="text-slate-400 text-[9px] font-bold uppercase mb-1">Tồn kho</p>
            <h3 class="text-xl font-black italic tracking-tight">14,250 <span class="text-[10px] text-slate-500 not-italic">Unit</span></h3>
        </div>
        <div class="glass-card p-5 rounded-[2rem]">
            <p class="text-slate-400 text-[9px] font-bold uppercase mb-1">Vật tư</p>
            <h3 class="text-xl font-black italic tracking-tight">842 <span class="text-[10px] text-slate-500 not-italic">SKU</span></h3>
        </div>
    </section>

    <section class="grid grid-cols-2 gap-4 mb-8">
        <button onclick="startScanner()" class="btn-active p-6 rounded-[2.5rem] bg-indigo-600 shadow-xl shadow-indigo-600/20 flex flex-col items-center">
            <span class="text-2xl mb-1">📥</span>
            <span class="font-extrabold text-sm">NHẬP KHO</span>
        </button>
        <button onclick="startScanner()" class="btn-active p-6 rounded-[2.5rem] glass-card flex flex-col items-center border-white/10">
            <span class="text-2xl mb-1">📤</span>
            <span class="font-extrabold text-sm">XUẤT KHO</span>
        </button>
    </section>

    <section class="space-y-4">
        <h2 class="text-[11px] font-bold text-slate-500 uppercase tracking-widest px-1">Lịch sử quét mã</h2>
        <div id="data-container" class="space-y-3">
            <div class="text-center py-10 text-slate-600 text-[10px] uppercase font-bold tracking-tighter italic">Chưa có dữ liệu mới...</div>
        </div>
    </section>

    <nav class="fixed bottom-6 left-6 right-6 h-20 glass-card rounded-[2.5rem] flex items-center justify-around px-6 border border-white/10 shadow-2xl z-50">
        <button class="text-indigo-400 text-2xl p-2 btn-active">🏠</button>
        <button class="text-slate-500 text-2xl p-2 btn-active">🔍</button>
        <button onclick="startScanner()" class="w-16 h-16 bg-indigo-600 rounded-3xl -mt-14 flex items-center justify-center shadow-2xl shadow-indigo-600/40 border-[6px] border-[#020617] btn-active">
            <span class="text-white text-2xl">📷</span>
        </button>
        <button class="text-slate-500 text-2xl p-2 btn-active">📊</button>
        <button class="text-slate-500 text-2xl p-2 btn-active">⚙️</button>
    </nav>

    <script>
        // 1. Logic Cài đặt App (PWA)
        let deferredPrompt;
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            document.getElementById('install-banner').style.display = 'block';
        });

        document.getElementById('btn-install-now').addEventListener('click', async () => {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                const { outcome } = await deferredPrompt.userChoice;
                if (outcome === 'accepted') document.getElementById('install-banner').style.display = 'none';
                deferredPrompt = null;
            }
        });

        // 2. Logic Máy quét QR/Barcode
        let html5QrCode;
        function startScanner() {
            document.getElementById('scanner-container').style.display = 'block';
            document.getElementById('reader').style.display = 'block';
            html5QrCode = new Html5Qrcode("reader");
            html5QrCode.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, (decodedText) => {
                const container = document.getElementById('data-container');
                container.innerHTML = `
                    <div class="glass-card p-5 rounded-[2rem] flex items-center gap-4 border-indigo-500/40 animate-pulse">
                        <div class="flex-1">
                            <h4 class="font-bold text-indigo-300 text-sm tracking-widest">${decodedText}</h4>
                            <p class="text-[10px] text-slate-500 uppercase mt-1">Vừa mới quét • Thành công</p>
                        </div>
                        <div class="text-emerald-400 text-xl">✓</div>
                    </div>
                ` + container.innerHTML;
                if (navigator.vibrate) navigator.vibrate(100);
                stopScanner();
            }).catch(err => console.error(err));
        }

        function stopScanner() {
            if (html5QrCode) {
                html5QrCode.stop().then(() => {
                    document.getElementById('scanner-container').style.display = 'none';
                });
            }
        }

        // 3. Đăng ký Service Worker
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js').catch(() => {});
        }
    </script>
</body>
</html>
